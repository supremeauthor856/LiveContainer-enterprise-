name: Build LiveContainer Enterprise

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Detect Scheme
        id: detect
        run: |
          set -e
          PROJ=$(ls -d *.xcodeproj 2>/dev/null | head -n1)
          WS=$(ls -d *.xcworkspace 2>/dev/null | head -n1)

          if [ -n "$WS" ]; then
            echo "project_flag=-workspace" >> $GITHUB_OUTPUT
            echo "project_path=$WS" >> $GITHUB_OUTPUT
            echo "Using workspace: $WS"
          else
            echo "project_flag=-project" >> $GITHUB_OUTPUT
            echo "project_path=$PROJ" >> $GITHUB_OUTPUT
            echo "Using project: $PROJ"
          fi

          SCHEME=$(find . -path "*/xcshareddata/xcschemes/*.xcscheme" -exec basename {} .xcscheme \; | grep -i "LiveContainer" | head -n1)
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Scheme: $SCHEME"

      - name: Patch Dev Cert Check
        run: |
          set -e
          echo "Patching LCUtils.m to always return YES for get-task-allow..."

          LCUTILS=$(find . -name "LCUtils.m" -not -path "./.git/*" | head -n1)
          if [ -n "$LCUTILS" ]; then
            echo "Found: $LCUTILS"
            
            # Replace any get-task-allow check to return YES
            sed -i '' 's/objectForKey:@"get-task-allow"\] boolValue\]/YES/g' "$LCUTILS"
            sed -i '' 's/\[@"get-task-allow"\]/@YES/g' "$LCUTILS"
            sed -i '' 's/boolForKey:@"get-task-allow"\]/YES/g' "$LCUTILS"
            
            # Replace SecTaskCopyValueForEntitlement for get-task-allow
            sed -i '' '/get-task-allow/{s/SecTaskCopyValueForEntitlement[^;]*/(__bridge id)kCFBooleanTrue/;}' "$LCUTILS"
            
            echo "Patched: $LCUTILS"
          else
            echo "ERROR: LCUtils.m not found"
            exit 1
          fi

          # Add get-task-allow to all entitlements files
          find . -name "*.entitlements" -type f | while read ent; do
            echo "Patching: $ent"
            if ! grep -q "get-task-allow" "$ent"; then
              sed -i '' 's|</dict>|	<key>get-task-allow</key>\
          	<true/>\
          </dict>|' "$ent"
            fi
          done

      - name: Show Changes
        run: |
          echo "=== Modified files ==="
          git diff --name-only
          echo ""
          echo "=== Diff ==="
          git diff

      - name: Clean
        run: rm -rf build DerivedData

      - name: Build Archive
        env:
          SCHEME: ${{ steps.detect.outputs.scheme }}
          PROJECT_FLAG: ${{ steps.detect.outputs.project_flag }}
          PROJECT_PATH: ${{ steps.detect.outputs.project_path }}
        run: |
          set -eo pipefail
          echo "Building $SCHEME..."

          xcodebuild \
            $PROJECT_FLAG "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/LiveContainer.xcarchive \
            -derivedDataPath DerivedData \
            clean archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            2>&1 | tee build.log

          if [ ! -d "build/LiveContainer.xcarchive" ]; then
            echo "BUILD FAILED"
            grep "error:" build.log | grep -v "warning" | tail -30
            tail -50 build.log
            exit 1
          fi
          echo "Archive created"

      - name: Create IPA
        run: |
          set -e
          APP_PATH=$(find build/LiveContainer.xcarchive/Products/Applications -name "*.app" -type d | head -n1)
          if [ -z "$APP_PATH" ]; then
            echo "No .app found"
            exit 1
          fi

          echo "Packaging: $(basename "$APP_PATH")"

          # Strip signatures for clean WSF signing
          find "$APP_PATH" -name "_CodeSignature" -type d -exec rm -rf {} + 2>/dev/null || true
          find "$APP_PATH" -name "CodeResources" -delete 2>/dev/null || true
          find "$APP_PATH" -name "embedded.mobileprovision" -delete 2>/dev/null || true

          # Package
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -r build/LiveContainer.ipa Payload -x "*.DS_Store"
          rm -rf Payload

          echo "IPA size: $(du -h build/LiveContainer.ipa | awk '{print $1}')"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-Enterprise-IPA
          path: build/LiveContainer.ipa
          if-no-files-found: error

      - name: Upload Build Log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          if-no-files-found: ignore
